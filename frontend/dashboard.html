<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Monitoring Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 600px; width: 100%; }
    h1 { color: #333; margin-bottom: 10px; }
    .device-name { color: #666; font-size: 14px; margin-bottom: 30px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 4px solid #667eea; }
    .stat-label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: bold; color: #333; }
    .stat-unit { font-size: 14px; color: #999; }
    .mist-status { padding: 15px; background: #e3f2fd; border-radius: 10px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .mist-indicator { width: 30px; height: 30px; border-radius: 50%; background: #ff9800; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .mist-indicator.active { background: #4caf50; }
    .timestamp { color: #999; font-size: 12px; text-align: center; margin-top: 20px; }
    .error { color: #f44336; background: #ffebee; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .loading { color: #999; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Plant Monitoring System</h1>
    <div class="device-name" id="deviceName">Loading...</div>
    
    <div id="error" class="error" style="display: none;"></div>
    <div id="loading" class="loading">Connecting to Firebase...</div>
    
    <div id="content" style="display: none;">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Temperature</div>
          <div class="stat-value"><span id="temperature">--</span><span class="stat-unit">°C</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Humidity</div>
          <div class="stat-value"><span id="humidity">--</span><span class="stat-unit">%</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Soil Moisture</div>
          <div class="stat-value"><span id="soilMoisture">--</span><span class="stat-unit">/1023</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Update</div>
          <div class="stat-value" style="font-size: 16px;" id="lastUpdate">--</div>
        </div>
      </div>

      <div class="mist-status">
        <div class="mist-indicator" id="mistIndicator">OFF</div>
        <div>
          <div class="stat-label">Mist Maker Status</div>
          <div id="mistStatus" style="font-size: 18px; font-weight: bold; color: #333;">OFF</div>
        </div>
      </div>

      <div class="timestamp" id="timestamp">Last data received: --</div>
    </div>
  </div>

  <script>
    // ===== CONFIGURATION =====
    // Minimal Firebase Web config. projectId is set from your service account.
    // You must provide `apiKey` and `appId` (from Firebase Console → Project Settings → Your apps) to fully initialize.
    const firebaseConfig = {
      apiKey: "AIzaSyCVMO-L9m6vmTjqngPxeOLVqWpZ_5fvQXs",
      authDomain: "zc-plant.firebaseapp.com",
      projectId: "zc-plant",
      storageBucket: "zc-plant.firebasestorage.app",
      messagingSenderId: "257037964538",
      appId: "1:257037964538:web:6b44640c7d93c50864a543",
    };

    const DEVICE_ID = "plant-01"; // Match the deviceId you registered

    // If apiKey or appId are missing, the page will prompt to paste full config.

    // ===== INITIALIZE FIREBASE =====
    try {
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // ===== REAL-TIME LISTENER =====
      // Listen to the device document and its latestReading field
      firebase.firestore().collection('devices').doc(DEVICE_ID).onSnapshot(
        (doc) => {
          if (!doc.exists) {
            showError("Device not found in Firestore. Make sure device is registered.");
            return;
          }

          const data = doc.data();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';
          document.getElementById('deviceName').textContent = data.name || DEVICE_ID;

          if (data.latestReading) {
            const reading = data.latestReading;
            document.getElementById('temperature').textContent = reading.temperature.toFixed(1);
            document.getElementById('humidity').textContent = reading.humidity.toFixed(1);
            document.getElementById('soilMoisture').textContent = reading.soilMoisture;
            
            // Update mist maker status
            const mistOn = reading.mistMaker;
            document.getElementById('mistStatus').textContent = mistOn ? 'ON' : 'OFF';
            document.getElementById('mistStatus').style.color = mistOn ? '#4caf50' : '#f44336';
            const indicator = document.getElementById('mistIndicator');
            if (mistOn) {
              indicator.classList.add('active');
              indicator.textContent = 'ON';
            } else {
              indicator.classList.remove('active');
              indicator.textContent = 'OFF';
            }

            // Format timestamp
            const ts = reading.serverReceivedAt ? new Date(reading.serverReceivedAt.toDate()) : new Date();
            const timeStr = ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('lastUpdate').textContent = timeStr;
            document.getElementById('timestamp').textContent = 'Last data received: ' + ts.toLocaleString();
          }
        },
        (error) => {
          showError("Firebase error: " + error.message);
        }
      );

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = msg;
      }
    } catch (e) {
      alert('Firebase error: ' + e.message + '\n\nEdit dashboard.html and set your Firebase config from the console.');
    }
  </script>
</body>
</html>
